services:
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    container_name: azure-storage-queue-demo-azurite
    command: >
      azurite
      --skipApiVersionCheck
      --blobHost 0.0.0.0
      --queueHost 0.0.0.0
      --tableHost 0.0.0.0
      --location /workspace
      --debug /workspace/debug.log
    ports:
      - "10000:10000"
      - "10001:10001"
      - "10002:10002"
    volumes:
      - azurite-data:/workspace

volumes:
  azurite-data:
